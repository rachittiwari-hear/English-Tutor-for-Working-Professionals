<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workplace English Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink:#101924;
  --ink-soft:#17222F;
  --ink-soft2:#1E2B3A;
  --line: rgba(233,237,242,0.12);
  --paper:#FBF7EE;
  --paper-dim:#EFE9DB;
  --amber:#FFB648;
  --amber-dim:#7A5A26;
  --teal:#3FC2B1;
  --teal-dim:#1C5750;
  --coral:#FF6B5E;
  --coral-dim:#7A2E28;
  --rose:#FF8FAB;
  --rose-dim:#7A3550;
  --violet:#9B8AFF;
  --text:#E9EDF2;
  --text-dim:#9AA7B5;
  --text-dark:#1A2330;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Spectral', serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:var(--ink);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
button{font-family:var(--font-display);}
::selection{background:var(--amber); color:var(--text-dark);}
:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}

/* ---------- HEADER ---------- */
header.top{
  position:sticky; top:0; z-index:50;
  background:rgba(16,25,36,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.top-row{
  max-width:1180px; margin:0 auto;
  display:flex; align-items:center; gap:18px;
  padding:14px 20px;
}
.logo{
  font-family:var(--font-display); font-weight:700; font-size:1.05rem;
  letter-spacing:0.2px; white-space:nowrap; display:flex; align-items:center; gap:8px;
}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block;}
nav.tabs{
  display:flex; gap:4px; overflow-x:auto; flex:1; scrollbar-width:none;
}
nav.tabs::-webkit-scrollbar{display:none;}
nav.tabs button{
  background:none; border:none; color:var(--text-dim);
  font-size:0.85rem; padding:8px 12px; border-radius:8px;
  cursor:pointer; white-space:nowrap; transition:color .15s, background .15s;
  font-weight:500;
}
nav.tabs button:hover{color:var(--text); background:var(--ink-soft);}
nav.tabs button.active{color:var(--text-dark); background:var(--amber);}
.streak-pill{
  font-family:var(--font-mono); font-size:0.75rem; color:var(--text-dim);
  border:1px solid var(--line); padding:6px 10px; border-radius:20px;
  white-space:nowrap; display:flex; align-items:center; gap:6px;
}
.streak-pill b{color:var(--amber); font-weight:500;}

/* voice toggle */
.voice-toggle{
  display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:0.72rem;
  color:var(--text-dim); border:1px solid var(--line); padding:5px 10px; border-radius:20px;
  cursor:pointer; white-space:nowrap; transition:border-color .15s;
  background:transparent;
}
.voice-toggle:hover{border-color:var(--rose);}
.voice-toggle.girl-active{border-color:var(--rose); color:var(--rose);}
.voice-toggle .vdot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);display:inline-block;}
.voice-toggle.girl-active .vdot{background:var(--rose);}

/* waveform strip */
.waveband{
  display:flex; align-items:flex-end; gap:3px; height:22px; padding:0 20px 8px;
  max-width:1180px; margin:0 auto;
}
.waveband .bar{
  width:3px; border-radius:2px; background:var(--line);
  transition:height .4s ease;
}
.waveband .bar.live{background:var(--teal);}
.waveband .bar.girl{background:var(--rose);}

/* ---------- LAYOUT ---------- */
main{max-width:1180px; margin:0 auto; padding:28px 20px 80px;}
.panel{display:none;}
.panel.active{display:block; animation:fade .35s ease;}
@keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* HERO (dashboard) */
.hero{
  display:grid; grid-template-columns:1.1fr 0.9fr; gap:32px; align-items:center;
  padding:36px 0 28px; border-bottom:1px solid var(--line); margin-bottom:28px;
}
@media (max-width:820px){.hero{grid-template-columns:1fr;}}
.hero h1{
  font-family:var(--font-display); font-size:2.4rem; line-height:1.12; margin:0 0 14px;
  font-weight:600; letter-spacing:-0.5px;
}
.hero h1 em{color:var(--amber); font-style:normal;}
.hero p.lead{color:var(--text-dim); font-size:1.05rem; max-width:480px; margin:0 0 20px;}
.cta-row{display:flex; gap:10px; flex-wrap:wrap;}
.btn{
  font-family:var(--font-display); font-weight:600; font-size:0.88rem;
  padding:11px 18px; border-radius:9px; border:1px solid transparent;
  cursor:pointer; transition:transform .12s ease, opacity .15s;
}
.btn:hover{transform:translateY(-1px);}
.btn.primary{background:var(--amber); color:var(--text-dark);}
.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text);}
.btn.teal{background:var(--teal); color:var(--text-dark);}
.btn.rose{background:var(--rose); color:var(--text-dark);}
.btn.violet{background:var(--violet); color:var(--text-dark);}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}

.signature{
  position:relative; border:1px solid var(--line); border-radius:16px; background:var(--ink-soft);
  padding:22px; min-height:230px; display:flex; flex-direction:column; justify-content:space-between;
}
.signature .label{font-family:var(--font-mono); font-size:0.7rem; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase;}
.sig-wave{display:flex; align-items:center; gap:4px; height:80px;}
.sig-wave .col{display:flex; flex-direction:column; align-items:center; gap:6px; flex:1;}
.sig-wave .stick{width:7px; border-radius:4px; background:var(--ink-soft2);}
.sig-wave .tag{font-family:var(--font-mono); font-size:0.62rem; color:var(--text-dim);}
.sig-stats{display:flex; gap:18px; font-family:var(--font-mono); font-size:0.72rem; color:var(--text-dim);}
.sig-stats b{color:var(--text); font-size:1.1rem; display:block; font-family:var(--font-display);}

/* dashboard grid of module cards */
.card-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:10px;}
@media (max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:560px){.card-grid{grid-template-columns:1fr;}}
.mod-card{
  border:1px solid var(--line); border-radius:14px; padding:18px; background:var(--ink-soft);
  cursor:pointer; transition:border-color .15s, transform .15s;
}
.mod-card:hover{border-color:var(--amber); transform:translateY(-2px);}
.mod-card .tag{font-family:var(--font-mono); font-size:0.65rem; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em;}
.mod-card h3{font-family:var(--font-display); margin:8px 0 6px; font-size:1.1rem;}
.mod-card p{margin:0; color:var(--text-dim); font-size:0.85rem; line-height:1.45;}
.mod-card .prog{margin-top:12px; height:5px; border-radius:3px; background:var(--ink-soft2); overflow:hidden;}
.mod-card .prog i{display:block; height:100%; background:var(--teal);}

/* generic section header */
.sec-head{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom:18px; flex-wrap:wrap;}
.sec-head h2{font-family:var(--font-display); font-size:1.5rem; margin:0; font-weight:600;}
.sec-head .sub{color:var(--text-dim); font-size:0.88rem; margin-top:4px; font-family:var(--font-body);}
.level-select{display:flex; gap:6px; background:var(--ink-soft); padding:4px; border-radius:9px; border:1px solid var(--line);}
.level-select button{
  background:none; border:none; color:var(--text-dim); font-size:0.78rem; padding:6px 12px;
  border-radius:7px; cursor:pointer; font-weight:500;
}
.level-select button.active{background:var(--teal); color:var(--text-dark);}

/* exercise card */
.ex-card{
  border:1px solid var(--line); border-radius:16px; background:var(--ink-soft); padding:24px; margin-bottom:18px;
}
.ex-card h3{font-family:var(--font-display); margin:0 0 4px; font-size:1.15rem;}
.ex-card .meta{font-family:var(--font-mono); font-size:0.68rem; color:var(--amber); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:14px; display:block;}
.passage{
  font-family:var(--font-body); font-size:1.08rem; line-height:1.75; background:var(--paper); color:var(--text-dark);
  padding:18px 20px; border-radius:10px; margin:14px 0;
}
.passage .blank{
  display:inline-block; border-bottom:2px dotted var(--amber-dim); min-width:60px; text-align:center;
}
.vocab-word{border-bottom:1.5px dashed var(--teal); cursor:help; position:relative;}
.vocab-word .tip{
  display:none; position:absolute; bottom:135%; left:0; background:var(--ink); color:var(--text);
  border:1px solid var(--teal); padding:8px 10px; border-radius:8px; font-family:var(--font-mono);
  font-size:0.72rem; width:200px; z-index:10; line-height:1.4;
}
.vocab-word:hover .tip{display:block;}

textarea, input[type=text]{
  width:100%; background:var(--ink); border:1px solid var(--line); color:var(--text);
  border-radius:9px; padding:12px 14px; font-family:var(--font-body); font-size:1rem;
  resize:vertical;
}
textarea:focus, input[type=text]:focus{border-color:var(--teal);}
.row{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; align-items:center;}
.feedback{
  margin-top:14px; padding:14px 16px; border-radius:10px; font-family:var(--font-mono); font-size:0.82rem;
  line-height:1.6; display:none;
}
.feedback.show{display:block;}
.feedback.good{background:rgba(63,194,177,0.12); border:1px solid var(--teal); color:var(--teal);}
.feedback.bad{background:rgba(255,107,94,0.1); border:1px solid var(--coral); color:var(--coral);}
.feedback.neutral{background:var(--ink-soft2); border:1px solid var(--line); color:var(--text-dim);}

.quiz-opts{display:flex; flex-direction:column; gap:8px; margin-top:10px;}
.quiz-opt{
  border:1px solid var(--line); border-radius:9px; padding:10px 14px; cursor:pointer; font-size:0.92rem;
  transition:border-color .12s, background .12s;
}
.quiz-opt:hover{border-color:var(--teal);}
.quiz-opt.correct{border-color:var(--teal); background:rgba(63,194,177,0.12);}
.quiz-opt.wrong{border-color:var(--coral); background:rgba(255,107,94,0.1);}

/* flashcards */
.deck-bar{display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:16px;}
.deck-chip{
  font-family:var(--font-mono); font-size:0.75rem; padding:7px 14px; border-radius:20px;
  border:1px solid var(--line); cursor:pointer; white-space:nowrap; color:var(--text-dim);
}
.deck-chip.active{background:var(--amber); color:var(--text-dark); border-color:var(--amber);}
.flash-wrap{display:flex; justify-content:center; margin:10px 0 18px;}
.flashcard{
  width:340px; height:200px; border-radius:16px; border:1px solid var(--line);
  background:var(--paper); color:var(--text-dark); display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; cursor:pointer; padding:20px;
  position:relative; perspective:800px;
}
.flashcard .word{font-family:var(--font-display); font-size:1.6rem; font-weight:600;}
.flashcard .pos{font-family:var(--font-mono); font-size:0.7rem; color:var(--amber-dim); margin-top:8px;}
.flashcard .meaning{display:none; font-family:var(--font-body); font-size:1rem; margin-top:10px; line-height:1.4;}
.flashcard .example{display:none; font-family:var(--font-body); font-style:italic; font-size:0.85rem; color:#555; margin-top:8px;}
.flashcard.flipped .word{display:none;}
.flashcard.flipped .pos{display:none;}
.flashcard.flipped .meaning, .flashcard.flipped .example{display:block;}
.flash-controls{display:flex; gap:10px; justify-content:center;}
.flash-progress{text-align:center; font-family:var(--font-mono); font-size:0.75rem; color:var(--text-dim); margin-top:8px;}

/* grammar topic list */
.gram-grid{display:grid; grid-template-columns:230px 1fr; gap:20px;}
@media (max-width:820px){.gram-grid{grid-template-columns:1fr;}}
.gram-list{display:flex; flex-direction:column; gap:6px;}
.gram-item{
  text-align:left; border:1px solid var(--line); background:var(--ink-soft); color:var(--text-dim);
  padding:10px 12px; border-radius:9px; cursor:pointer; font-size:0.85rem;
}
.gram-item.active{border-color:var(--amber); color:var(--text);}
.gram-item .sc{font-family:var(--font-mono); font-size:0.65rem; color:var(--teal); display:block; margin-top:3px;}

.tip-box{
  border-left:3px solid var(--amber); padding:10px 14px; background:rgba(255,182,72,0.08);
  font-size:0.88rem; border-radius:0 8px 8px 0; margin:12px 0; color:var(--text);
}
.accent-box{
  border-left:3px solid var(--rose); padding:10px 14px; background:rgba(255,143,171,0.08);
  font-size:0.85rem; border-radius:0 8px 8px 0; margin:10px 0; color:var(--text);
  font-family:var(--font-mono);
}
.accent-box strong{color:var(--rose);}

.scenario-line{display:flex; gap:10px; margin-bottom:10px; align-items:flex-start;}
.scenario-line .who{
  font-family:var(--font-mono); font-size:0.7rem; min-width:62px; padding-top:3px; color:var(--text-dim);
}
.scenario-line.you .who{color:var(--amber);}
.scenario-line .txt{flex:1; background:var(--ink-soft2); padding:10px 12px; border-radius:9px; font-size:0.92rem;}
.scenario-line.you .txt{background:rgba(255,182,72,0.08); border:1px solid var(--amber-dim);}

.small-note{font-size:0.78rem; color:var(--text-dim); font-family:var(--font-mono); margin-top:8px;}
.mic-indicator{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:0.75rem; color:var(--text-dim);
}
.mic-dot{width:8px; height:8px; border-radius:50%; background:var(--text-dim);}
.mic-dot.live{background:var(--coral); animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.3;}}

/* interview module */
.interview-card{border:1px solid var(--violet); border-radius:16px; padding:24px; background:rgba(155,138,255,0.05); margin-bottom:18px;}
.interview-card .q{font-family:var(--font-display); font-size:1.05rem; margin:0 0 14px;}
.interview-card .star-guide{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px;}
@media(max-width:600px){.interview-card .star-guide{grid-template-columns:1fr;}}
.star-step{border:1px solid var(--line); border-radius:9px; padding:12px 14px;}
.star-step .sl{font-family:var(--font-mono); font-size:0.65rem; color:var(--violet); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;}
.star-step p{margin:0; font-size:0.85rem; color:var(--text-dim);}

/* idiom challenge */
.idiom-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
@media(max-width:600px){.idiom-grid{grid-template-columns:1fr;}}
.idiom-tile{border:1px solid var(--line); border-radius:12px; padding:16px; background:var(--ink-soft); cursor:pointer; transition:border-color .15s;}
.idiom-tile:hover{border-color:var(--teal);}
.idiom-tile .phrase{font-family:var(--font-display); font-size:1rem; font-weight:600; margin-bottom:6px;}
.idiom-tile .clue{font-size:0.82rem; color:var(--text-dim);}
.idiom-tile .reveal{display:none; margin-top:10px; font-size:0.88rem; padding:8px 10px; background:rgba(63,194,177,0.08); border-radius:7px; border:1px solid var(--teal-dim);}
.idiom-tile.open .reveal{display:block;}

/* pronunciation table */
.pron-table{width:100%; border-collapse:collapse; font-size:0.88rem; margin:14px 0;}
.pron-table th{font-family:var(--font-mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--amber); padding:8px 12px; text-align:left; border-bottom:1px solid var(--line);}
.pron-table td{padding:8px 12px; border-bottom:1px solid rgba(233,237,242,0.06); vertical-align:top;}
.pron-table tr:last-child td{border-bottom:none;}
.pron-table .word-col{font-family:var(--font-mono); color:var(--text);}
.pron-table .note-col{color:var(--text-dim);}
.pron-table .indian-col{color:var(--rose); font-family:var(--font-mono);}

/* progress rings on dashboard */
.stat-ring{display:flex; flex-direction:column; align-items:center; gap:4px;}
.ring-svg{transform:rotate(-90deg);}
.ring-track{fill:none; stroke:var(--ink-soft2); stroke-width:5;}
.ring-fill{fill:none; stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset .6s ease;}

footer.foot{border-top:1px solid var(--line); padding:24px 20px; text-align:center; color:var(--text-dim); font-family:var(--font-mono); font-size:0.75rem;}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="logo"><span class="dot"></span>Workplace English Lab</div>
    <nav class="tabs" id="tabNav"></nav>
    <button class="voice-toggle" id="voiceToggle" title="Switch voice gender">
      <span class="vdot"></span><span id="voiceLabel">♀ Girl voice</span>
    </button>
    <div class="streak-pill" id="streakPill">🔥 <b>0</b> day streak</div>
  </div>
  <div class="waveband" id="waveband"></div>
</header>

<main id="mainArea"></main>

<footer class="foot">Built for self-study — practice a little every day. Your progress is saved automatically on this device. · Voice: <span id="footVoice">Indian English (female)</span></footer>

<script>
/* ============================= VOICE SYSTEM ============================= */
// Prefer Indian English female voice, fallback gracefully
let voiceGender = "girl"; // "girl" | "guy"
let selectedVoice = null;

function loadVoices(){
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  // Priority: Indian female > Indian > English female > any English
  const indianFemale = voices.find(v=> /india/i.test(v.lang) && /female|woman|girl|zira|heera|raveena|lekha|priya|aarav|ananya/i.test(v.name));
  const indianAny = voices.find(v=> /india|hi-IN|en-IN/i.test(v.lang));
  const englishFemale = voices.find(v=> /en/i.test(v.lang) && /female|woman|girl|zira|google uk.*female|samantha|karen|moira|tessa|victoria|fiona|veena/i.test(v.name));
  const englishAny = voices.find(v=> /en/i.test(v.lang));
  selectedVoice = indianFemale || indianAny || englishFemale || englishAny || null;
  updateVoiceUI();
}

if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}

function updateVoiceUI(){
  const tog = document.getElementById("voiceToggle");
  const lbl = document.getElementById("voiceLabel");
  const foot = document.getElementById("footVoice");
  if(!tog) return;
  if(voiceGender==="girl"){
    tog.className="voice-toggle girl-active";
    lbl.textContent = "♀ Girl voice";
    if(foot) foot.textContent = selectedVoice ? `${selectedVoice.name} (${selectedVoice.lang})` : "Indian English (female)";
  } else {
    tog.className="voice-toggle";
    lbl.textContent = "♂ Guy voice";
    if(foot) foot.textContent = "Standard male voice";
  }
}

function speak(text, rate){
  if(!('speechSynthesis' in window)){ alert("Your browser doesn't support text-to-speech."); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = rate || 0.88;
  // Always try Indian English pitch/accent
  if(voiceGender==="girl"){
    const voices = window.speechSynthesis.getVoices();
    const indianFemale = voices.find(v=> /india|en-IN/i.test(v.lang) && /female|heera|raveena|lekha|priya/i.test(v.name));
    const indianAny = voices.find(v=> /india|en-IN/i.test(v.lang));
    const engFemale = voices.find(v=> /en/i.test(v.lang) && /female|samantha|karen|moira|tessa|fiona|veena|victoria|zira/i.test(v.name));
    utter.voice = indianFemale || indianAny || engFemale || selectedVoice || null;
    utter.pitch = 1.15;
    utter.lang = (utter.voice && utter.voice.lang) || "en-IN";
  } else {
    const voices = window.speechSynthesis.getVoices();
    const male = voices.find(v=> /en/i.test(v.lang) && /male|man|guy|daniel|alex|david|mark|james|fred/i.test(v.name));
    utter.voice = male || null;
    utter.pitch = 0.85;
    utter.lang = "en-US";
  }
  window.speechSynthesis.speak(utter);
}

/* ============================= DATA ============================= */

const LEVELS = ["Beginner","Intermediate","Advanced"];

const LISTENING_DATA = [

const STORAGE_KEY = "wel-progress-v2";

async function loadProgress(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if(res && res.value){
      state.progress = Object.assign(state.progress, JSON.parse(res.value));
    }
  }catch(e){}
  touchStreak();
  renderAll();
}
async function saveProgress(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(state.progress)); }catch(e){console.warn("save failed",e);}
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function touchStreak(){
  const today = todayStr();
  if(state.progress.lastDate === today) return;
  const last = state.progress.lastDate ? new Date(state.progress.lastDate) : null;
  const now = new Date(today);
  if(last){
    const diffDays = Math.round((now - last)/86400000);
    if(diffDays === 1) state.progress.streak += 1;
    else if(diffDays > 1) state.progress.streak = 1;
  } else {
    state.progress.streak = 1;
  }
  state.progress.lastDate = today;
  saveProgress();
}
function addPoints(n){ state.progress.points += n; saveProgress(); renderTopBar(); }

function moduleCompletion(key, dataArr){
  const done = Object.keys(state.progress[key]||{}).length;

  const wb = document.getElementById("waveband");
  let bars = "";

  for(let i=0;i<36;i++){

/* ============================= SPEECH RECOGNITION ============================= */
function wordOverlapScore(target, said){
  const norm = s => s.toLowerCase().replace(/[^a-z0-9' ]/g," ").split(/\s+/).filter(Boolean);
  const t = norm(target), s = norm(said);
  if(t.length===0) return 0;
  let matched = 0;
  const sCopy = [...s];
  t.forEach(w=>{
    const i = sCopy.indexOf(w);
    if(i>-1){ matched++; sCopy.splice(i,1); }
  });
  return Math.round((matched/t.length)*100);
}

let recognition = null;
function startRecording(targetPhrase, key, btn, feedbackEl, indicatorEl){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    feedbackEl.className = "feedback neutral show";
    feedbackEl.innerHTML = "Speech recognition isn't supported in this browser. Practice anyway: say the phrase out loud 3 times, matching the rhythm of the model audio, then mark it complete.";
    return;
  }
  try{
    recognition = new SR();
    recognition.lang = "en-IN";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    indicatorEl.querySelector(".mic-dot").classList.add("live");
    indicatorEl.childNodes[1].textContent = " listening…";
    recognition.onresult = (e)=>{
      const said = e.results[0][0].transcript;
      const score = wordOverlapScore(targetPhrase, said);
      feedbackEl.className = "feedback show " + (score>=70?"good":score>=40?"neutral":"bad");
      feedbackEl.innerHTML = `You said: "<i>${escapeHTML(said)}</i>"<br>Match score: <b>${score}%</b> ${score>=70?"— great job! Your pronunciation is clear.":score>=40?"— good attempt! Listen once more and focus on word stress.":"— try again. Listen to the girl voice, then mirror her rhythm."}`;
      if(score>=60){
        state.progress.speakDone[key]=true;
        addPoints(10);
      }
    };
    recognition.onerror = (e)=>{
      feedbackEl.className = "feedback bad show";
      feedbackEl.innerHTML = "Microphone access wasn't available (" + e.error + "). Allow microphone permissions and try again.";
    };
    recognition.onend = ()=>{
      indicatorEl.querySelector(".mic-dot").classList.remove("live");
      indicatorEl.childNodes[1].textContent = " idle";
    };
    recognition.start();
  }catch(err){
    feedbackEl.className = "feedback bad show";
    feedbackEl.innerHTML = "Couldn't start the microphone in this environment. Practice by speaking aloud and comparing yourself to the model audio.";
  }
}

      answers.forEach(a=>{ if(typed.includes(a)) correct++; });
      const fb = card.querySelector("[data-dictation-feedback]");

      if(!state.progress.writeDone[key]){ state.progress.writeDone[key]=true; addPoints(10); }
      renderAll();
    });

      if(!state.progress.scenarioDone[key]){ state.progress.scenarioDone[key]=true; addPoints(15); }

    });

  document.querySelectorAll('[data-action="complete-interview"]').forEach(el=>{

    el.addEventListener("click", ()=>{
      const total = parseInt(el.dataset.total);
      let correct = 0;
      document.querySelectorAll('#grammarQuiz .quiz').forEach(group=>{
        if(group.dataset.answered){
          const wrongEl = group.querySelector(".quiz-opt.correct");
          if(wrongEl) correct++;
        }
      });
      const fb = document.querySelector("[data-grammar-feedback]");
      fb.className = "feedback show " + (correct===total?"good":correct>0?"neutral":"bad");
      fb.innerHTML = `Score: <b>${correct}/${total}</b>. ${correct===total? "Excellent — you've mastered this topic for now.":"Review the examples above and try again."}`;
      const prevBest = state.progress.grammarBest[el.dataset.topic] || 0;
      if(correct > prevBest){ state.progress.grammarBest[el.dataset.topic] = correct; addPoints(correct*3); }
    });
  });

  // scenario switch
  document.querySelectorAll("[data-scenario]").forEach(el=>{
    el.addEventListener("click", ()=>{ scenarioState.id = el.dataset.scenario; renderAll(); });
  });

  // mic support note on speaking tab
  const micStatus = document.getElementById("micStatus");
  if(micStatus){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    micStatus.textContent = SR
      ? "Your browser supports live speech recognition — click 'Record my voice' and allow microphone access when prompted."
      : "Live speech recognition isn't available here. You can still listen to the model and practice out loud.";
  }
}

/* ============================= INIT ============================= */
loadProgress();
</script>
</body>
</html>
